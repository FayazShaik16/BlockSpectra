name: Sync to Hugging Face Spaces

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push backend subtree to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Set up git identity
          git config --global user.email "fayazeduonline@gmail.com"
          git config --global user.name "FayazShaik16"
          
          # Add Hugging Face Space as a remote using the secret HF_TOKEN
          git remote add hf https://FayazShaik:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/FayazShaik/blockspectra-backend
          
          # Force push the backend subtree to HF main branch
          git subtree push --prefix backend hf main
